<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>amal-crypto-icons — gallery</title>
<style>
  :root{ --bg:#0B0D11; --surface:#14171D; --line:#232830; --ink:#ECEEF2;
         --muted:#7E8794; --accent:#5AA0FF; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:32px 24px 80px;}
  header{max-width:1100px;margin:0 auto 24px;}
  h1{font-weight:300;font-size:30px;letter-spacing:-.02em;}
  p.sub{color:var(--muted);font-size:14px;margin-top:8px;}
  .bar{max-width:1100px;margin:0 auto 20px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  input{flex:1;min-width:220px;background:var(--surface);border:1px solid var(--line);color:var(--ink);
        border-radius:12px;padding:12px 16px;font-size:15px;outline:none;}
  input:focus{border-color:var(--accent);}
  .seg{display:flex;border:1px solid var(--line);border-radius:100px;overflow:hidden;}
  .seg button{background:none;border:none;color:var(--muted);padding:9px 16px;cursor:pointer;font-size:13px;font-weight:600;}
  .seg button.on{background:var(--accent);color:var(--bg);}
  .count{color:var(--muted);font-size:13px;}
  .grid{max-width:1100px;margin:0 auto;display:grid;gap:10px;
        grid-template-columns:repeat(auto-fill,minmax(96px,1fr));}
  .cell{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px 8px 10px;
        text-align:center;cursor:pointer;transition:.15s;}
  .cell:hover{border-color:var(--accent);transform:translateY(-2px);}
  .cell img{width:44px;height:44px;}
  .cell .sym{margin-top:8px;font-size:12px;font-weight:600;}
  .cell .nm{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--accent);color:var(--bg);
        padding:12px 20px;border-radius:100px;font-size:14px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<header>
  <h1>amal-crypto-icons</h1>
  <p class="sub">High-quality vector crypto + fiat icons. Click any icon to copy its CDN URL.</p>
</header>
<div class="bar">
  <input id="q" placeholder="Search symbol or name…" autofocus>
  <div class="seg">
    <button data-k="crypto" class="on">Crypto</button>
    <button data-k="mono">Mono</button>
    <button data-k="network">Networks</button>
    <button data-k="fiat">Fiat</button>
  </div>
  <span class="count" id="count"></span>
</div>
<div class="grid" id="grid"></div>
<div class="toast" id="toast">Copied URL ✓</div>

<script>
const CDN = 'https://cdn.jsdelivr.net/gh/amalsaidov/amal-crypto-icons@main/';
let DATA = {crypto:[], fiat:[], network:[]}, kind = 'crypto';

fetch('manifest.json').then(r=>r.json()).then(m=>{
  DATA.crypto = m.crypto || [];
  DATA.fiat = m.fiat || [];
  DATA.network = m.networks || [];
  render();
});

const q = document.getElementById('q'), grid = document.getElementById('grid'),
      countEl = document.getElementById('count'), toast = document.getElementById('toast');

document.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.seg button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); kind = b.dataset.k; render();
});
q.oninput = render;

function render(){
  const term = q.value.trim().toLowerCase();
  const fiat = kind==='fiat', net = kind==='network';
  const src = fiat ? DATA.fiat : net ? DATA.network : DATA.crypto;
  const list = src.filter(e=>{
    const sym = (fiat ? e.code : net ? e.id : e.symbol).toLowerCase();
    return !term || sym.includes(term) || (e.name||'').toLowerCase().includes(term);
  });
  countEl.textContent = list.length + ' icons';
  grid.innerHTML = list.map(e=>{
    const sym = fiat ? e.code : net ? e.id : e.symbol;
    const path = fiat ? e.flagSvg : net ? e.colorSvg : (kind==='mono' ? (e.monoSvg||e.colorSvg) : e.colorSvg);
    return `<div class="cell" data-url="${CDN}${path}">
      <img loading="lazy" src="${path}" alt="${sym}">
      <div class="sym">${sym}</div><div class="nm">${e.name||''}</div></div>`;
  }).join('');
  grid.querySelectorAll('.cell').forEach(c=>c.onclick=()=>{
    navigator.clipboard.writeText(c.dataset.url);
    toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),1100);
  });
}
</script>
</body>
</html>
